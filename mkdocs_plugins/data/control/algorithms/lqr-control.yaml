# Enhanced Algorithm Schema for Algorithm Documentation

# Basic metadata
slug: lqr-control
name: Linear Quadratic Regulator (LQR)
family_id: control

# Brief one-sentence summary for cards and navigation
hidden: false  # Show in navigation
summary: "Optimal state feedback controller that minimizes a quadratic cost function via algebraic Riccati equation."

# Detailed description (markdown supported)
description: |
  Linear Quadratic Regulator (LQR) is an optimal control method that minimizes a quadratic cost function for linear time-invariant systems. It provides the optimal state feedback gains by solving the continuous-time Algebraic Riccati Equation (ARE), ensuring optimal performance while balancing state regulation and control effort.

  LQR is fundamental to modern control theory and is widely used in aerospace, robotics, and process control applications where optimal performance is desired. The method guarantees stability for controllable systems and provides a systematic approach to controller design.

# Problem formulation and mathematical details
formulation:
  cost_function: |
    Minimize the infinite-horizon quadratic cost:

    J = ∫₀^∞ (xᵀQx + uᵀRu) dt

    Where:
    - x is the state vector
    - u is the control input
    - Q is the state cost matrix (positive semi-definite)
    - R is the control cost matrix (positive definite)

  system_dynamics: |
    Linear time-invariant system:

    ẋ = Ax + Bu

    Where:
    - A is the system dynamics matrix
    - B is the control input matrix

  optimal_control: |
    The optimal control law is:

    u = -Kx

    Where K is the optimal feedback gain:

    K = R⁻¹BᵀP

    And P is the solution to the Algebraic Riccati Equation:

    AᵀP + PA - PBR⁻¹BᵀP + Q = 0

  key_properties:
    - name: "Optimality"
      formula: "J* = xᵀ₀Px₀"
      description: "Minimum cost achieved with optimal control"
    - name: "Stability"
      formula: "Re(λᵢ(A - BK)) < 0"
      description: "Closed-loop system is asymptotically stable"
    - name: "Guaranteed Margins"
      formula: "GM ≥ ∞, PM ≥ 60°"
      description: "Guaranteed gain and phase margins"

# Key properties and characteristics
