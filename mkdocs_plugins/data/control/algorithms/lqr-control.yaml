# Comprehensive complexity analysis
complexity:
  analysis:
    - approach: "LQR Gain Computation"
      time: "O(n³)"
      space: "O(n²)"
      notes: "Dominated by ARE solution via Schur decomposition"
    - approach: "Control Computation"
      time: "O(n²)"
      space: "O(n²)"
      notes: "Matrix-vector multiplication per time step"

  performance_notes:
    - "One-time gain computation, then constant-time control"
    - "Suitable for real-time applications after offline design"
    - "Memory requirements scale with state dimension"

